<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HashGuard | Credential Scanner</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}" />
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='img/favicon.svg') }}" />
  </head>
  <body>
    <nav>
      <a href="/" class="brand-link">HASHGUARD</a>
      <div class="nav-links">
        <a href="https://haveibeenpwned.com/API/v3" target="_blank" style="font-size: 0.8rem; opacity: 0.7;">[ API_DOCS ]</a>

        <button id="theme-toggle" title="Toggle Theme">
          <svg id="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 20px; height: 20px;">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.05" x2="19.78" y2="6.47"></line>
          </svg>
        </button>
      </div>
    </nav>

    <div class="container">
      {% with messages=get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="alert-{{ category }}" style="border: 1px solid var(--danger); padding: 1rem; color: var(--danger); margin-bottom: 1rem;">{{ message }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      {% block content %}

      {% endblock %}
    </div>

    <script>
      const btn = document.getElementById('theme-toggle')
      
      // Restore saved theme on every page load (persists across form submissions)
      const saved = localStorage.getItem('theme')
      if (saved) document.documentElement.setAttribute('data-theme', saved)
      
      btn.addEventListener('click', () => {
        const current = document.documentElement.getAttribute('data-theme')
        const next = current === 'light' ? 'dark' : 'light'
        document.documentElement.setAttribute('data-theme', next)
        localStorage.setItem('theme', next)
      })
    </script>
  </body>
</html>
